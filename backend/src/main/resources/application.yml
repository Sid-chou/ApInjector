spring:
  application:
    name: apinjector-backend
  datasource:
    url: jdbc:h2:file:./data/apinjector;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false # Disable Redis for now if not available

server:
  port: 8080
